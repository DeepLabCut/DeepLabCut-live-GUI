name: Build, validate & Release

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  test_matrix:
    name: Test install & smoke (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Qt/OpenGL runtime deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libopengl0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine wheel "packaging>=24.2"
          cache: pip

      - name: Build (for validation only)
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Install from wheel & smoke test
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          import importlib
          m = importlib.import_module("dlclivegui")
          print("Imported:", m.__name__)
          PY

  build_release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: test_matrix
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install -U pip build twine

      - name: Build distributions
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI (API token)
    runs-on: ubuntu-latest
    needs: build_release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Twine
        run: python -m pip install -U twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TWINE_API_KEY }}
        run: python -m twine upload --non-interactive --verbose --skip-existing dist/*
