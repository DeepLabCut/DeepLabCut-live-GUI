
[tox]
min_version = 4.0
isolated_build = true
env_list =
    py{310,311,312}-all
    py{310,311,312}-nogui
    py{310,311,312}-gui

[testenv]
description = Base env - installs package without deps, then installs test deps
skip_install = true

# Install your package itself without pulling runtime dependencies (so deeplabcut-live is skipped)
commands_pre =
    python -m pip install -U pip
    python -m pip install -e . --no-deps

# Test/runtime deps needed to exercise the GUI (explicit list; no deeplabcut-live)
deps =
    PySide6
    numpy
    opencv-python
    matplotlib
    vidgear[core]
    pytest>=7.0
    pytest-cov>=4.0
    pytest-mock>=3.10
    pytest-qt>=4.2
    pytest-env

setenv =
    QT_QPA_PLATFORM = offscreen
    QT_LOGGING_RULES = qt.qpa.*=false

passenv =
    CI
    GITHUB_ACTIONS
    GITHUB_*
    USE_XVFB

commands =
    pytest -m "not gui" {posargs}

[testenv:py{310,311,312}-all]
description = Full suite including GUI tests
commands =
    pytest {posargs}

[testenv:py{310,311,312}-nogui]
description = Exclude GUI tests
commands =
    pytest -m "not gui" {posargs}

[testenv:py{310,311,312}-gui]
description = GUI tests only
commands =
    pytest -m "gui" {posargs}
